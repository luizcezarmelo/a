<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Materiais - Prótese Total 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary: #4a90e2;
            --primary-dark: #357abd;
            --accent: #e67e22;
            --success: #2ecc71;
            --bg: #f5f7fa;
            --card: #ffffff;
            --text: #333333;
            --muted: #888888;
            --border: #e1e4e8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 700px;
            background: var(--card);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 1.6rem;
        }

        .btn-container {
            position: sticky;
            top: 0;
            background: var(--card);
            padding: 10px 0;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
            z-index: 100;
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            font-size: 0.95rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            text-align: center;
        }

        .btn:hover { background-color: var(--primary-dark); }
        .btn.active { background-color: var(--accent); }
        .btn-pdf { background-color: var(--success); }
        .btn-pdf:hover { background-color: #27ae60; }

        .category {
            font-weight: bold;
            color: var(--primary);
            margin: 25px 0 10px 0;
            font-size: 1.1rem;
            border-bottom: 2px solid var(--border);
            padding-bottom: 5px;
        }

        .item {
            display: flex;
            align-items: flex-start;
            padding: 12px 8px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            user-select: none;
        }

        .item:hover { background-color: #f9fbfd; }
        .item input {
            margin-right: 12px;
            margin-top: 3px;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .item-text {
            flex: 1;
            font-size: 1rem;
            line-height: 1.4;
        }

        .item.checked .item-text {
            text-decoration: line-through;
            color: var(--muted);
            opacity: 0.6;
        }

        .hide-completed .item.checked {
            display: none !important;
        }

        @media (max-width: 480px) {
            body { padding: 10px; }
            .container { padding: 15px; }
            h1 { font-size: 1.3rem; }
            .btn-container { flex-direction: column; gap: 8px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Lista de Materiais 2026</h1>
    
    <div class="btn-container">
        <button id="filterBtn" class="btn">Mostrar Apenas Não Marcados</button>
        <button id="pdfBtn" class="btn btn-pdf">Exportar PDF (Faltantes)</button>
    </div>

    <div id="lista-dinamica"></div>
</div>

<script>
    // Todos os seus itens originais de volta com a indexação segura por ID
    const dadosIndexados = {
        "Equipamentos e Instrumentos": [
            { id: 101, nome: "Articulador Semi Ajustável - BioArt A7 FIX (sem arco facial) [OBS: Uso no 3º mês dependendo do ritmo da turma]" },
            { id: 102, nome: "Modelos de Estudo (Adquiridos na ETEFOR)" },
            { id: 103, nome: "2x Placas de Vidro (NÃO TÃO FINA) - vende só em dentais" },
            { id: 104, nome: "Lapiseira 0.7" },
            { id: 105, nome: "Espátulas: Lecron, nº 07, nº 31 e nº 36" },
            { id: 106, nome: "Lamparina a Álcool" },
            { id: 107, nome: "Concha para Cera com base segura ou flexível" },
            { id: 108, nome: "Flambador (Lamparina de Hanau)" },
            { id: 109, nome: "Mesa de Camper plástico" },
            { id: 110, nome: "1 Motor de Acabamento de 35.000 RPM (Maraton, Talmax, Kota ou motor de chicote)" },
            { id: 111, nome: "Espátula de metal para gesso" },
            { id: 112, nome: "Régua Flexível pequena" },
            { id: 113, nome: "2 conta-gotas (bisnaga)" }
        ],
        "Brocas e Desgaste/Polimento": [
            { id: 201, nome: "Broca Maxicut nº 1251 (American ou outra marca)" },
            { id: 202, nome: "Broca Minicut nº 1520 (American ou outra marca)" },
            { id: 203, nome: "Broca Carbide 700 PM da JET" },
            { id: 204, nome: "Mandril para Lixa" },
            { id: 205, nome: "Brocas de acabamentos de resinas PM (Kit de polidores acrílicos 3 cores: cinza 2141, verde 2143 e amarela 2145 - American ou outra)" }
        ],
        "Recipientes e Organização": [
            { id: 301, nome: "Pote Paladon silicone" },
            { id: 302, nome: "Pote Dappen (silicone) - de preferência o grande" },
            { id: 303, nome: "Cuba de borracha - de preferência grande" }
        ],
        "Químicos, Ceras e Insumos": [
            { id: 401, nome: "2x Pincel comum de pintura nº 10 e 12 (1 para Isolante e 1 para Vaselina)" },
            { id: 402, nome: "Vaselina Sólida (bisnaga de 30g individual ou quantidade maior coletiva)" },
            { id: 403, nome: "Isolante para resina de 100ml (Coletivo ou Individual)" },
            { id: 404, nome: "Caixa de Cera Nº7 e Cera Nº9 (de preferência marca Wilson - Coletivo ou Individual)" },
            { id: 405, nome: "Cera utilidades (Coletivo ou Individual)" },
            { id: 406, nome: "Álcool 96% (ABSOLUTO)" },
            { id: 407, nome: "Algodão (pode ser qualquer um, não precisa ser de dental)" },
            { id: 408, nome: "Resina Acrílica Incolor Pó (Auto Polimerizável) 500g - EVODEN ou outra marca (Coletivo ou Individual)" },
            { id: 409, nome: "Resina Acrílica Líquida (Auto Polimerizável) 500ml - EVODEN ou outra marca (Coletivo ou Individual) [OBS: Pó e Líquido devem ser da mesma marca]" },
            { id: 410, nome: "Gesso Pedra (1kg) - vende na escola" },
            { id: 411, nome: "Escova de dente infantil (pelo macio)" },
            { id: 412, nome: "Cola Super Bonder e isqueiro" }
        ],
        "EPIs (Obrigatórios)": [
            { id: 501, nome: "Jaleco de manga longa (qualquer cor)" },
            { id: 502, nome: "Óculos de proteção" },
            { id: 503, nome: "Máscara" },
            { id: 504, nome: "Touca" },
            { id: 505, nome: "Luva" },
            { id: 506, nome: "Protetor de bancada (folha de EVA) nas cores verde, azul ou cinza" }
        ]
    };

    const listaContainer = document.getElementById('lista-dinamica');
    const filterBtn = document.getElementById('filterBtn');
    const pdfBtn = document.getElementById('pdfBtn');
    
    const STORAGE_KEY = 'lista_protese_2026_indexada';
    let estadoSalvo = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};

    function salvarEstado() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(estadoSalvo));
    }

    // Renderizar lista na tela
    Object.keys(dadosIndexados).forEach(categoria => {
        const divCat = document.createElement('div');
        divCat.className = 'category';
        divCat.innerText = categoria;
        listaContainer.appendChild(divCat);

        dadosIndexados[categoria].forEach(item => {
            const label = document.createElement('label');
            label.className = 'item';
            
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            
            const span = document.createElement('span');
            span.className = 'item-text';
            span.innerText = item.nome;

            label.appendChild(checkbox);
            label.appendChild(span);
            listaContainer.appendChild(label);

            if (estadoSalvo[item.id]) {
                checkbox.checked = true;
                label.classList.add('checked');
            }

            checkbox.addEventListener('change', function() {
                if (this.checked) {
                    label.classList.add('checked');
                    estadoSalvo[item.id] = true;
                } else {
                    label.classList.remove('checked');
                    delete estadoSalvo[item.id];
                }
                salvarEstado();
            });
        });
    });

    // Filtro de Visualização
    let apenasAtivos = false;
    filterBtn.addEventListener('click', function() {
        apenasAtivos = !apenasAtivos;
        if (apenasAtivos) {
            listaContainer.classList.add('hide-completed');
            this.innerText = "Mostrar Todos os Materiais";
            this.classList.add('active');
        } else {
            listaContainer.classList.remove('hide-completed');
            this.innerText = "Mostrar Apenas Não Marcados";
            this.classList.remove('active');
        }
    });

    // Gerador de PDF Dinâmico (Apenas Itens Não Marcados)
    pdfBtn.addEventListener('click', function() {
        const elementoPDF = document.createElement('div');
        elementoPDF.style.padding = '30px';
        elementoPDF.style.color = '#333';
        elementoPDF.style.fontFamily = 'Arial, sans-serif';

        elementoPDF.innerHTML = `
            <h1 style="text-align: center; color: #2c3e50; margin-bottom: 5px;">Materiais Faltantes</h1>
            <p style="text-align: center; color: #7f8c8d; font-size: 0.9rem; margin-bottom: 30px;">Gerado em: ${new Date().toLocaleDateString('pt-BR')}</p>
        `;

        let temItemFaltanteGeral = false;

        Object.keys(dadosIndexados).forEach(categoria => {
            const itensFaltantes = dadosIndexados[categoria].filter(item => !estadoSalvo[item.id]);

            if (itensFaltantes.length > 0) {
                temItemFaltanteGeral = true;
                
                const tituloCategoria = document.createElement('h3');
                tituloCategoria.style.color = '#4a90e2';
                tituloCategoria.style.borderBottom = '2px solid #e1e4e8';
                tituloCategoria.style.paddingBottom = '5px';
                tituloCategoria.style.marginTop = '20px';
                tituloCategoria.style.marginBottom = '10px';
                tituloCategoria.innerText = categoria;
                elementoPDF.appendChild(tituloCategoria);

                const ul = document.createElement('ul');
                ul.style.listStyleType = 'none';
                ul.style.paddingLeft = '5px';

                itensFaltantes.forEach(item => {
                    const li = document.createElement('li');
                    li.style.padding = '6px 0';
                    li.style.borderBottom = '1px dashed #eee';
                    li.style.fontSize = '0.95rem';
                    li.innerHTML = `▢  ${item.nome}`;
                    ul.appendChild(li);
                });

                elementoPDF.appendChild(ul);
            }
        });

        if (!temItemFaltanteGeral) {
            alert("Parabéns! Todos os itens já foram comprados/marcados.");
            return;
        }

        const opcoes = {
            margin:       [15, 15, 15, 15],
            filename:     'materiais_faltantes_protese.pdf',
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { scale: 2, useCORS: true },
            jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        // Corrigido: Chamando as opções corretamente para gerar o download
        html2pdf().set(opcoes).from(elementoPDF).save();
    });
</script>

</body>
</html>
